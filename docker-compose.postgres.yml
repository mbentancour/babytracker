# Postgres override — run with:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up
#
# Requires a .env file with POSTGRES_PASSWORD set.
# See .env.example for all available variables.
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-babytracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — copy .env.example to .env and edit}
      POSTGRES_DB: ${POSTGRES_DB:-babytracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babytracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-babytracker}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-babytracker}?sslmode=prefer
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
