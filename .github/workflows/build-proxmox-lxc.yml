name: Build Proxmox LXC Template

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend to embed directory
        run: |
          rm -rf internal/router/static/*
          cp -r frontend/dist/* internal/router/static/

      - name: Build Go binary
        run: |
          CGO_ENABLED=0 go build \
            -o babytracker.bin \
            ./cmd/babytracker/

      - name: Install debootstrap
        run: sudo apt-get update && sudo apt-get install -y debootstrap zstd

      - name: Build LXC template
        run: |
          sudo BABYTRACKER_BINARY="$(pwd)/babytracker.bin" \
               OUTPUT_DIR="$(pwd)/output" \
               deploy/proxmox/lxc/build-lxc-template.sh

      - name: Upload LXC template
        uses: actions/upload-artifact@v4
        with:
          name: babytracker-lxc-template
          path: output/babytracker-lxc-*.tar.zst
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/babytracker-lxc-*.tar.zst
