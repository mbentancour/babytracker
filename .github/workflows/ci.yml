name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Go tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: babytracker
          POSTGRES_PASSWORD: test
          POSTGRES_DB: babytracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U babytracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        # TEST_DATABASE_URL enables the handler integration tests against the
        # postgres service; without it they skip.
        env:
          TEST_DATABASE_URL: postgres://babytracker:test@localhost:5432/babytracker?sslmode=disable
        run: go test -race ./...

  frontend:
    name: Frontend tests + build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Unit tests
        run: cd frontend && npm test

      - name: Build
        run: cd frontend && npm run build
