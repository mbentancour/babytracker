name: Build Go Binary

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend to embed directory
        run: |
          rm -rf internal/router/static/*
          cp -r frontend/dist/* internal/router/static/

      - name: Build Go binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -trimpath \
            -ldflags="-s -w -X 'github.com/mbentancour/babytracker/internal/version.Version=${VERSION}'" \
            -o babytracker-linux-${{ matrix.arch }} \
            ./cmd/babytracker/

      - name: Compute SHA256
        run: |
          sha256sum babytracker-linux-${{ matrix.arch }} > babytracker-linux-${{ matrix.arch }}.sha256
          cat babytracker-linux-${{ matrix.arch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: babytracker-linux-${{ matrix.arch }}
          path: |
            babytracker-linux-${{ matrix.arch }}
            babytracker-linux-${{ matrix.arch }}.sha256

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            babytracker-linux-${{ matrix.arch }}
            babytracker-linux-${{ matrix.arch }}.sha256
