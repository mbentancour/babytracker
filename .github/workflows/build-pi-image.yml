name: Build Pi Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    # Native arm64 runner — no QEMU emulation needed.
    # Free for public repos.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend to embed directory
        run: |
          rm -rf internal/router/static/*
          cp -r frontend/dist/* internal/router/static/

      - name: Build Go binary (native arm64)
        run: |
          mkdir -p deploy/rpi-image-gen/files/usr/local/bin
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -o deploy/rpi-image-gen/files/usr/local/bin/babytracker.bin \
            ./cmd/babytracker/

      - name: Stage common files into rpi-image-gen source tree
        run: |
          # Create the common-files staging directory that the layer YAML copies first.
          # It contains: shared config files (/etc/...) and common provisioning scripts.
          STAGING="deploy/rpi-image-gen/common-files"
          rm -rf "${STAGING}"
          mkdir -p "${STAGING}"

          # Shared config files (env, systemd units, avahi, apt)
          cp -a deploy/common/files/. "${STAGING}/"

          # Common provisioning scripts → /usr/lib/babytracker/common/
          mkdir -p "${STAGING}/usr/lib/babytracker/common"
          cp deploy/common/install.sh \
             deploy/common/setup-postgres.sh \
             deploy/common/setup-tls.sh \
             deploy/common/setup-ufw.sh \
             "${STAGING}/usr/lib/babytracker/common/"

      - name: Clone rpi-image-gen
        run: git clone --depth 1 https://github.com/raspberrypi/rpi-image-gen.git /tmp/rpi-image-gen

      - name: Install rpi-image-gen dependencies
        run: |
          sudo apt-get update
          cd /tmp/rpi-image-gen && sudo ./install_deps.sh

      - name: Build BabyTracker Pi image
        run: |
          cd /tmp/rpi-image-gen
          ./rpi-image-gen build \
            -S "$GITHUB_WORKSPACE/deploy/rpi-image-gen" \
            -c "$GITHUB_WORKSPACE/deploy/rpi-image-gen/config/babytracker.yaml"

      - name: Inspect output
        run: |
          echo "=== All candidate files in work dir ==="
          find /tmp/rpi-image-gen/work -type f \( -name '*.img*' -o -name '*.zst' -o -name '*.xz' -o -name '*.ext4' -o -name '*.vfat' \) -printf '%10s\t%p\n' | sort -rn
          echo
          echo "=== Image output dir ==="
          ls -lah /tmp/rpi-image-gen/work/image-babytracker/ 2>/dev/null || echo "(no image dir)"
          echo
          echo "=== Deploy output dir(s) ==="
          ls -lah /tmp/rpi-image-gen/work/deploy-*/ 2>/dev/null || echo "(no deploy dir)"

      - name: Smoke test Pi image
        run: |
          set -euo pipefail
          echo "=== Pi Image Smoke Test ==="

          # Find the built image
          IMG=$(sudo find /tmp/rpi-image-gen/work -type f \( -name '*.img' -o -name '*.img.xz' \) 2>/dev/null | head -1)
          if [ -z "$IMG" ]; then
            echo "ERROR: No .img file found in build output"
            sudo find /tmp/rpi-image-gen/work -type f 2>/dev/null | head -50
            exit 1
          fi
          echo "Found image: $IMG"

          # Decompress if needed
          if [[ "$IMG" == *.xz ]]; then
            echo "Decompressing..."
            xz -d "$IMG"
            IMG="${IMG%.xz}"
          fi

          # Set up loop device and mount root partition
          LOOP=$(sudo losetup --find --show --partscan "$IMG")
          echo "Loop device: $LOOP"
          sudo partx -u "$LOOP" || true

          # List partitions and their types for debugging
          echo "Partitions:"
          sudo fdisk -l "$LOOP" || true
          sudo blkid "${LOOP}p"* 2>/dev/null || true

          sudo mkdir -p /mnt/pi-rootfs

          # Find the root partition (largest ext4/btrfs partition, usually p2)
          ROOT_PART=""
          for p in "${LOOP}p2" "${LOOP}p1" "${LOOP}p3"; do
            if [ -b "$p" ]; then
              FSTYPE=$(sudo blkid -o value -s TYPE "$p" 2>/dev/null || true)
              echo "  $p: $FSTYPE"
              if [ "$FSTYPE" = "ext4" ] || [ "$FSTYPE" = "btrfs" ]; then
                ROOT_PART="$p"
                break
              fi
            fi
          done
          if [ -z "$ROOT_PART" ]; then
            echo "ERROR: Could not find root partition"
            exit 1
          fi
          echo "Mounting root partition: $ROOT_PART"
          sudo mount "$ROOT_PART" /mnt/pi-rootfs

          PASS=0
          FAIL=0
          check() {
            local desc="$1"
            shift
            if "$@" > /dev/null 2>&1; then
              echo "  PASS: $desc"
              PASS=$((PASS + 1))
            else
              echo "  FAIL: $desc"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "--- File presence checks ---"
          check "babytracker binary exists" test -f /mnt/pi-rootfs/usr/local/bin/babytracker
          check "firstboot.sh exists" test -f /mnt/pi-rootfs/usr/local/bin/babytracker-firstboot.sh
          check "setup-wifi.sh exists" test -f /mnt/pi-rootfs/usr/local/bin/babytracker-setup-wifi.sh
          check "babytracker.env exists" test -f /mnt/pi-rootfs/etc/babytracker/babytracker.env
          check "babytracker.service exists" test -f /mnt/pi-rootfs/etc/systemd/system/babytracker.service
          check "firstboot.service exists" test -f /mnt/pi-rootfs/etc/systemd/system/babytracker-firstboot.service
          check "setup-ap.service exists" test -f /mnt/pi-rootfs/etc/systemd/system/babytracker-setup-ap.service
          check "avahi service exists" test -f /mnt/pi-rootfs/etc/avahi/services/babytracker.service
          check "hostapd.conf exists" test -f /mnt/pi-rootfs/etc/hostapd/hostapd.conf
          check ".needs-setup flag exists" test -f /mnt/pi-rootfs/var/lib/babytracker/.needs-setup
          check "common scripts installed" test -f /mnt/pi-rootfs/usr/lib/babytracker/common/setup-postgres.sh

          echo "--- Binary checks ---"
          check "binary is ARM aarch64 ELF" file /mnt/pi-rootfs/usr/local/bin/babytracker '|' grep -q 'ELF 64-bit.*ARM aarch64'
          check "binary is executable" test -x /mnt/pi-rootfs/usr/local/bin/babytracker

          echo "--- System user ---"
          check "babytracker user exists" grep -q '^babytracker:' /mnt/pi-rootfs/etc/passwd
          check "pi user locked" grep -q '^pi:!' /mnt/pi-rootfs/etc/shadow || grep -q '^pi:\*' /mnt/pi-rootfs/etc/shadow

          echo "--- Installed packages ---"
          check "postgresql installed" test -f /mnt/pi-rootfs/usr/bin/psql
          check "hostapd installed" test -f /mnt/pi-rootfs/usr/sbin/hostapd
          check "ufw installed" test -f /mnt/pi-rootfs/usr/sbin/ufw
          check "avahi-daemon installed" test -f /mnt/pi-rootfs/usr/sbin/avahi-daemon
          check "nmcli installed" test -f /mnt/pi-rootfs/usr/bin/nmcli

          echo "--- Permissions ---"
          check "data dir owned by babytracker" stat -c '%U:%G' /mnt/pi-rootfs/var/lib/babytracker '|' grep -q 'babytracker:babytracker'
          check "sudoers is 0440" stat -c '%a' /mnt/pi-rootfs/etc/sudoers.d/babytracker '|' grep -q '440'

          echo ""
          echo "=== Results: ${PASS} passed, ${FAIL} failed ==="

          # Cleanup
          sudo umount /mnt/pi-rootfs
          sudo losetup -d "$LOOP"

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi

      - name: Upload entire output dir
        uses: actions/upload-artifact@v4
        with:
          name: babytracker-pi-image
          path: |
            /tmp/rpi-image-gen/work/image-babytracker/
            /tmp/rpi-image-gen/work/deploy-*/
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/rpi-image-gen/work/image-babytracker/*.img.xz
            /tmp/rpi-image-gen/work/deploy-*/*.img.xz
          fail_on_unmatched_files: false
