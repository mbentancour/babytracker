name: Build Pi Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Native arm64 runner — no QEMU emulation needed.
    # Free for public repos.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend to embed directory
        run: |
          rm -rf internal/router/static/*
          cp -r frontend/dist/* internal/router/static/

      - name: Build Go binary (native arm64)
        run: |
          mkdir -p deploy/rpi-image-gen/layer/babytracker.rootfs-overlay/usr/local/bin
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -o deploy/rpi-image-gen/layer/babytracker.rootfs-overlay/usr/local/bin/babytracker.bin \
            ./cmd/babytracker/

      - name: Clone rpi-image-gen
        run: git clone --depth 1 https://github.com/raspberrypi/rpi-image-gen.git /tmp/rpi-image-gen

      - name: Install rpi-image-gen dependencies
        run: |
          sudo apt-get update
          cd /tmp/rpi-image-gen && sudo ./install_deps.sh

      - name: Build BabyTracker Pi image
        run: |
          cd /tmp/rpi-image-gen
          ./rpi-image-gen build \
            -S "$GITHUB_WORKSPACE/deploy/rpi-image-gen" \
            -c "$GITHUB_WORKSPACE/deploy/rpi-image-gen/config/babytracker.yaml"

      - name: Locate output image
        id: image
        run: |
          IMG=$(find /tmp/rpi-image-gen/work -type f \( -name '*.img.xz' -o -name '*.img' \) | head -n 1)
          echo "Found image: $IMG"
          echo "path=$IMG" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: babytracker-pi-image
          path: ${{ steps.image.outputs.path }}
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.image.outputs.path }}
