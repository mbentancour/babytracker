name: "BabyTracker"
version: "1.3.0"
slug: "babytracker"
description: >-
  A modern, self-contained baby tracking application with charts, timers,
  photo gallery, picture frame mode, and quick-log actions.
  Can run locally with a built-in database or connect to an external
  BabyTracker instance.
url: "https://github.com/mbentancour/babytracker"
init: false
homeassistant: "2025.1.0"
arch:
  - amd64
  - aarch64
  - armv7
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 8099
# Exposing 8099 here (with a null host mapping) puts the add-on on
# Supervisor's shared Docker network so peer containers — notably the
# BabyTracker HA integration — can resolve its hostname and reach it
# directly. A null mapping means NO host port is opened; the port is only
# reachable from inside the HA add-on/Docker network.
ports:
  "8099/tcp": null
ports_description:
  "8099/tcp": BabyTracker HTTP (internal network only; no host port exposed)
# NOTE on peer-container DNS. Supervisor assigns each add-on a container DNS
# name of the form "<hash>-babytracker", where <hash> is an 8-char SHA1 of
# the exact repository URL the user typed when adding the add-on repo (a
# trailing .git or / changes the hash). There is no way to pin a predictable
# short name — the `hostname:` add-on config field only sets the in-container
# OS hostname, not the Docker DNS alias. The HA integration's config flow
# asks the user to paste the exact URL, so the unpredictable hash is worked
# around via user input rather than guessed at.
panel_icon: "mdi:baby-face-outline"
panel_title: "BabyTracker"
panel_admin: false
map:
  - type: data
    read_only: false
  - type: media
    read_only: false
options:
  mode: "local"
  external_url: ""
  unit_system: "metric"
  demo_mode: false
  media_path: ""
  database_url: ""
schema:
  mode: "list(local|external)"
  external_url: "str?"
  unit_system: "list(metric|imperial)"
  demo_mode: bool
  media_path: "str?"
  database_url: "str?"
