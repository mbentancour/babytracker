services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-babytracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — copy .env.example to .env and edit}
      POSTGRES_DB: ${POSTGRES_DB:-babytracker}
    volumes:
      # PG18+ stores data under a major-version subdir (/var/lib/postgresql/18/docker)
      # so pg_upgrade --link works without crossing mount boundaries. Mount the
      # parent so the versioned subdir lives inside the volume; mounting at
      # /var/lib/postgresql/data triggers a startup refusal on 18+.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babytracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    ports:
      # One knob (PORT) drives both sides so the host port, the container
      # port, and the port the app logs can never drift apart — the URL the
      # app prints ("starting HTTPS server, port <PORT>") is exactly the one
      # you open. Defaults to 8443 to avoid needing elevated privileges to
      # bind a low port; to serve on standard HTTPS set PORT=443 in your .env
      # (e.g. https://your-host/ with no port suffix).
      - "${PORT:-8443}:${PORT:-8443}"
    environment:
      PORT: ${PORT:-8443}
      # sslmode=prefer: use TLS if the DB advertises it, fall back to plaintext
      # on the local docker network. For remote DBs set sslmode=verify-full.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-babytracker}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-babytracker}?sslmode=prefer}
      DATA_DIR: /var/lib/babytracker
      # JWT_SECRET is optional — the app auto-generates and persists one under
      # DATA_DIR/.jwt_secret if unset.
      JWT_SECRET: ${JWT_SECRET:-}
      UNIT_SYSTEM: ${UNIT_SYSTEM:-metric}
      DEMO_MODE: ${DEMO_MODE:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
