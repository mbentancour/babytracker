services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: babytracker
      POSTGRES_PASSWORD: babytracker
      POSTGRES_DB: babytracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babytracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8099:8099"
    environment:
      DATABASE_URL: postgres://babytracker:babytracker@db:5432/babytracker?sslmode=disable
      DATA_DIR: /var/lib/babytracker
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      UNIT_SYSTEM: ${UNIT_SYSTEM:-metric}
      DEMO_MODE: ${DEMO_MODE:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
