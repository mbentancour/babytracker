# Default: SQLite (zero-config, no external DB needed).
# For Postgres: use docker-compose.postgres.yml override instead.
services:
  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8099:8099"
    environment:
      # SQLite is the default — DATABASE_URL points at a file inside DATA_DIR.
      # Override with a postgres:// URL to use Postgres instead.
      DATABASE_URL: ${DATABASE_URL:-/var/lib/babytracker/babytracker.db}
      DATA_DIR: /var/lib/babytracker
      JWT_SECRET: ${JWT_SECRET:-}
      UNIT_SYSTEM: ${UNIT_SYSTEM:-metric}
      DEMO_MODE: ${DEMO_MODE:-false}
    volumes:
      - appdata:/var/lib/babytracker
    restart: unless-stopped

volumes:
  appdata:
