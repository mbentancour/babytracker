<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7AFF"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>
  <!-- Rounded purple tile -->
  <rect x="0" y="0" width="128" height="128" rx="26" ry="26" fill="url(#bg)"/>

  <!-- Baby bottle silhouette, centered -->
  <g transform="translate(64 64)">
    <!-- Nipple (teat) -->
    <path d="M -9 -42
             Q -12 -46  -9 -48
             L  9 -48
             Q 12 -46   9 -42
             Z"
          fill="#ffffff" opacity="0.95"/>
    <!-- Collar / ring between nipple and bottle -->
    <rect x="-16" y="-42" width="32" height="7" rx="3" fill="#ffffff" opacity="0.95"/>
    <!-- Bottle body -->
    <rect x="-22" y="-33" width="44" height="68" rx="10" fill="#ffffff" opacity="0.95"/>
    <!-- Measurement marks on the bottle -->
    <g stroke="#6C5CE7" stroke-width="2.2" stroke-linecap="round">
      <line x1="-12" y1="-20" x2="-2" y2="-20"/>
      <line x1="-12" y1="-8"  x2="6"  y2="-8"/>
      <line x1="-12" y1="4"   x2="-2" y2="4"/>
      <line x1="-12" y1="16"  x2="6"  y2="16"/>
    </g>
    <!-- Liquid level indicator (subtle fill hint) -->
    <rect x="-22" y="10" width="44" height="25" rx="10" fill="#8B7AFF" opacity="0.35"/>
  </g>
</svg>
