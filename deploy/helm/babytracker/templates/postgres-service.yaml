{{- if .Values.postgresql.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "babytracker.postgresHost" . }}
  labels:
    {{- include "babytracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "babytracker.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}
