apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "babytracker.fullname" . }}
  labels:
    {{- include "babytracker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate  # BabyTracker uses a local volume for photos; can't have two pods writing
  selector:
    matchLabels:
      {{- include "babytracker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "babytracker.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when secrets change
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: babytracker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: https
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: DATA_DIR
              value: /var/lib/babytracker
            - name: UNIT_SYSTEM
              value: {{ .Values.config.unitSystem | quote }}
            - name: DEMO_MODE
              value: {{ .Values.config.demoMode | quote }}
            - name: TLS_ENABLED
              value: {{ .Values.config.tlsEnabled | quote }}
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "babytracker.fullname" . }}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: {{ include "babytracker.databaseUrl" . | quote }}
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "babytracker.fullname" . }}
                  key: DATABASE_URL
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "babytracker.fullname" . }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/babytracker
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "babytracker.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
