apiVersion: v1
kind: Secret
metadata:
  name: {{ include "babytracker.fullname" . }}
  labels:
    {{- include "babytracker.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.jwtSecret }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  {{- if not .Values.secrets.postgresPassword }}
  {{- fail "secrets.postgresPassword is required when postgresql.enabled=true" }}
  {{- end }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  {{- else }}
  {{- if not .Values.secrets.databaseUrl }}
  {{- fail "secrets.databaseUrl is required when postgresql.enabled=false" }}
  {{- end }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- end }}
  {{- range $k, $v := .Values.secrets.acmeCredentials }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
