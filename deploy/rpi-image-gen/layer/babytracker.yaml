# METABEGIN
# X-Env-Layer-Name: babytracker
# X-Env-Layer-Desc: Self-contained baby tracking appliance
# X-Env-Layer-Category: app
# X-Env-Layer-Version: 1.0.0
# METAEND
---
mmdebstrap:
  packages:
    - postgresql
    - postgresql-client
    - hostapd
    - dnsmasq
    - avahi-daemon
    - avahi-utils
    - ufw
    - openssl
    - ssl-cert
    - network-manager
    - iptables
    - unattended-upgrades
    - apt-listchanges
    - sudo

  customize-hooks:
    # Copy shared (common) files into the rootfs first, then Pi-specific files
    # on top. The CI workflow stages common/ into the source tree before build.
    # cwd is the SRC dir; common-files/ and files/ hold the trees.
    - cp -a common-files/. $1/
    - cp -a files/. $1/
    # .gitkeep is only needed to preserve empty dirs in git — remove it from the image
    - rm -f $1/var/lib/babytracker/.gitkeep

    # Create the babytracker system user (no home dir, no login shell)
    - chroot $1 useradd --system --no-create-home --shell /usr/sbin/nologin babytracker

    # Install the binary (mv preserves nothing, so chmod after)
    - mv $1/usr/local/bin/babytracker.bin $1/usr/local/bin/babytracker
    - chmod 755 $1/usr/local/bin/babytracker
    - chmod 755 $1/usr/local/bin/babytracker-firstboot.sh $1/usr/local/bin/babytracker-setup-wifi.sh

    # Make common scripts executable
    - chmod 755 $1/usr/lib/babytracker/common/*.sh

    # Sudoers must be 0440 root:root or sudo refuses to use it
    - chmod 440 $1/etc/sudoers.d/babytracker

    # Env file holds no secrets but contains paths — restrict to babytracker group
    - chroot $1 chown root:babytracker /etc/babytracker/babytracker.env
    - chmod 640 $1/etc/babytracker/babytracker.env

    # Mark the device as needing first-boot setup
    - touch $1/var/lib/babytracker/.needs-setup
    - chroot $1 chown -R babytracker:babytracker /var/lib/babytracker
    - chmod 750 $1/var/lib/babytracker

    # Disable services we want under our own control (started by setup-ap unit)
    - chroot $1 systemctl disable hostapd
    - chroot $1 systemctl disable dnsmasq

    # Use NetworkManager for Wi-Fi management (nmcli scan/connect).
    # Trixie's systemd-networkd would conflict — disable it.
    - chroot $1 systemctl disable systemd-networkd
    - chroot $1 systemctl disable systemd-networkd-wait-online
    - chroot $1 systemctl enable NetworkManager
    # dhcpcd may not be installed in Trixie minbase — ignore "unit not found"
    - chroot $1 systemctl disable dhcpcd || true

    # In debug mode, keep the pi user usable and SSH enabled for first-boot
    # troubleshooting. In production builds, lock pi and disable SSH.
    # Toggle via BABYTRACKER_DEBUG=1 env var when running rpi-image-gen.
    - |
        if [ "${BABYTRACKER_DEBUG:-0}" = "1" ]; then
          chroot "$1" sh -c 'echo "pi:babytracker" | chpasswd'
          chroot "$1" usermod -s /bin/bash pi
          chroot "$1" systemctl enable ssh
        else
          chroot "$1" passwd -l pi
          chroot "$1" usermod -s /usr/sbin/nologin pi
          chroot "$1" systemctl disable ssh
        fi

    # UFW is configured on first boot by firstboot.sh — can't run ufw inside
    # the chroot because it needs kernel netfilter access (unavailable in the
    # bdebstrap unshare namespace).

    # Enable our systemd units. Both have ConditionPathExists guards on .needs-setup.
    - $BDEBSTRAP_HOOKS/enable-units "$1" babytracker-firstboot
    - $BDEBSTRAP_HOOKS/enable-units "$1" babytracker-setup-ap
    - $BDEBSTRAP_HOOKS/enable-units "$1" postgresql
    - $BDEBSTRAP_HOOKS/enable-units "$1" avahi-daemon
