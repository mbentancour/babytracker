# Default: SQLite (zero-config). For Postgres, add:
#   docker compose -f docker-compose.yml -f ../../docker-compose.postgres.yml up
services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8099:8099"
    environment:
      DATABASE_URL: ${DATABASE_URL:-/var/lib/babytracker/babytracker.db}
      DATA_DIR: /var/lib/babytracker
      JWT_SECRET: ${JWT_SECRET:-}
      UNIT_SYSTEM: ${UNIT_SYSTEM:-metric}
      DEMO_MODE: ${DEMO_MODE:-false}
    volumes:
      - appdata:/var/lib/babytracker
    restart: unless-stopped

volumes:
  appdata:
